version: '3.8'

# Lightweight OLake test stack for E2E compatibility tests.
# Usage:
#   docker compose -f tests/compat/docker-compose.test.yml up -d
#   OLAKE_DB_URL=postgres://olake:olake@localhost:5432/olake?sslmode=disable \
#     go test -tags e2e ./tests/compat/ -v
#   docker compose -f tests/compat/docker-compose.test.yml down -v

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: olake
      POSTGRES_USER: olake
      POSTGRES_PASSWORD: olake
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U olake -d olake"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pg_test_data:/var/lib/postgresql/data

  # OLake BFF server — runs migrations on startup.
  # Replace image tag with the version you want to test against.
  olake-server:
    image: ghcr.io/datazip-inc/olake-ui-server:latest
    environment:
      OLAKE_POSTGRES_HOST: postgres
      OLAKE_POSTGRES_PORT: "5432"
      OLAKE_POSTGRES_DB: olake
      OLAKE_POSTGRES_USER: olake
      OLAKE_POSTGRES_PASSWORD: olake
      OLAKE_RUN_MODE: dev
      OLAKE_SECRET_KEY: test-encryption-key-32bytes-here!
      TEMPORAL_ADDRESS: temporal:7233
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    # Restart a few times until the DB is ready for migrations.
    restart: on-failure

  # Minimal Temporal server for workflow tests.
  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: olake
      POSTGRES_PWD: olake
      POSTGRES_DB: olake
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.26.2
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8088:8080"
    depends_on:
      - temporal

volumes:
  pg_test_data:
