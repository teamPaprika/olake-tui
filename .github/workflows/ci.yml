name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build
        run: go build ./cmd/olake-tui/

      - name: Unit Tests
        run: go test ./... -v -timeout 60s

      - name: Vet
        run: go vet ./...

  e2e:
    name: E2E Compatibility Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: olake
          POSTGRES_USER: olake
          POSTGRES_PASSWORD: olake
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Wait for OLake migrations
        # The BFF server applies schema migrations on first run.
        # For CI we pull the server image and run it briefly to seed the DB.
        run: |
          docker pull ghcr.io/datazip-inc/olake-ui-server:latest || true
          docker run --rm --network host \
            -e OLAKE_POSTGRES_HOST=localhost \
            -e OLAKE_POSTGRES_PORT=5432 \
            -e OLAKE_POSTGRES_DB=olake \
            -e OLAKE_POSTGRES_USER=olake \
            -e OLAKE_POSTGRES_PASSWORD=olake \
            -e OLAKE_RUN_MODE=dev \
            ghcr.io/datazip-inc/olake-ui-server:latest migrate || true
          sleep 5

      - name: E2E Tests
        run: go test -tags e2e ./tests/compat/ -v -timeout 120s
        env:
          OLAKE_DB_URL: postgres://olake:olake@localhost:5432/olake?sslmode=disable
          OLAKE_RUN_MODE: dev
